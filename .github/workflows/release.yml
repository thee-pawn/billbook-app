# ─────────────────────────────────────────────────────────────────────────────
# BillBook desktop release — lives in the billbook-app repo (separate from fe/wa)
#
# This workflow checks out three sibling folders (matches local dev layout):
#   ../billbook-fe            ← Vite frontend (GitHub repo: billbook-frontend → folder billbook-fe)
#   ../whatsapp_automation    ← WhatsApp automation (esbuild → dist/server.js)
#   . (billbook-app)          ← Electron + electron-builder
#
# billbook-be is NOT needed for this build (AWS API is configured in frontend env).
#
# Triggers: push tag v*.*.*  or  workflow_dispatch
#
# Secrets (repo: billbook-app → Settings → Secrets → Actions)
#   MULTI_REPO_CHECKOUT_TOKEN  — REQUIRED. A PAT (fine-grained or classic) with
#                                Contents: Read on billbook-frontend + whatsapp-automation.
#                                The default GITHUB_TOKEN cannot read other repos — GitHub
#                                returns 404 "Not Found" for get-repository, which breaks checkout.
#
# Publishing uses the default GITHUB_TOKEN (no PAT needed for uploads to THIS repo).
# Optional signing secrets: MAC_CSC_*, APPLE_*, WIN_CSC_* (same as before).
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (optional; defaults to ref)'
        required: false

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Used in error messages / docs. Checkout steps below use the same owner/repo explicitly
  # so logs show "Syncing repository: thee-pawn/billbook-frontend" (not the local folder name).
  BILLBOOK_FE_REPO: thee-pawn/billbook-frontend
  WHATSAPP_AUTOMATION_REPO: thee-pawn/whatsapp-automation

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag → $VERSION"

      - name: Verify package.json matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.ver.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) ≠ tag ($TAG_VERSION)"
            echo "Run: npm version $TAG_VERSION --no-git-tag-version && git commit -am chore && retag"
            exit 1
          fi
          echo "✅ $PKG_VERSION"

  build:
    name: Build (${{ matrix.name }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            platform: mac
            arch: arm64
          - name: macOS x64
            os: macos-13
            platform: mac
            arch: x64
          - name: Windows x64
            os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Require PAT for sibling repo checkouts
        shell: bash
        run: |
          if [ -z "$MULTI_REPO_CHECKOUT_TOKEN" ]; then
            echo "::error title=Missing secret::Add MULTI_REPO_CHECKOUT_TOKEN (Settings → Secrets → Actions). Use a PAT with Contents: Read on ${{ env.BILLBOOK_FE_REPO }} and ${{ env.WHATSAPP_AUTOMATION_REPO }}. GITHUB_TOKEN cannot access other repos — checkout fails with Not Found."
            exit 1
          fi
        env:
          MULTI_REPO_CHECKOUT_TOKEN: ${{ secrets.MULTI_REPO_CHECKOUT_TOKEN }}

      # Parent folder will hold three siblings: billbook-app, billbook-fe, whatsapp_automation
      - name: Checkout billbook-app (this repo)
        uses: actions/checkout@v4
        with:
          path: billbook-app

      # path=billbook-fe keeps ../billbook-fe working in package.json / electron-builder.
      # repository= must be the real GitHub repo (billbook-frontend), not the folder name.
      - name: Checkout frontend (thee-pawn/billbook-frontend → ./billbook-fe)
        uses: actions/checkout@v4
        with:
          repository: thee-pawn/billbook-frontend
          path: billbook-fe
          token: ${{ secrets.MULTI_REPO_CHECKOUT_TOKEN }}

      # Repo slug is whatsapp-automation; local folder stays whatsapp_automation for package.json / esbuild.
      - name: Checkout whatsapp-automation (thee-pawn/whatsapp-automation → ./whatsapp_automation)
        uses: actions/checkout@v4
        with:
          repository: thee-pawn/whatsapp-automation
          path: whatsapp_automation
          token: ${{ secrets.MULTI_REPO_CHECKOUT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            billbook-fe/package-lock.json
            whatsapp_automation/package-lock.json
            billbook-app/package-lock.json

      - name: Install ImageMagick (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install imagemagick -y --no-progress

      - name: Install ImageMagick (macOS)
        if: matrix.os == 'macos-14' || matrix.os == 'macos-13'
        run: brew list imagemagick &>/dev/null || brew install imagemagick

      - run: npm ci
        working-directory: billbook-fe
      - run: npm ci
        working-directory: whatsapp_automation
      - run: npm ci
        working-directory: billbook-app

      - run: npm run build
        working-directory: billbook-fe

      - run: npm run build:backend
        working-directory: billbook-app

      # electron-builder.yml expects build/icon.{icns,ico,png}. Those files are often gitignored;
      # empty CSC_* env vars also break signing (builder treats paths as cert files → "not a file").
      - name: Ensure build icons (CI fallback)
        working-directory: billbook-app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            for d in /c/Program\ Files/ImageMagick-*; do
              [[ -d "$d" ]] && export PATH="$d:$PATH" && break
            done
          fi
          if [[ "${{ runner.os }}" == "macOS" ]] && [[ ! -f build/icon.icns ]]; then
            E="node_modules/electron/dist/Electron.app/Contents/Resources/electron.icns"
            [[ -f "$E" ]] && cp "$E" build/icon.icns
          fi
          if [[ ! -f build/icon.png ]]; then
            convert -size 512x512 xc:'#1e3a8a' build/icon.png || magick -size 512x512 xc:'#1e3a8a' build/icon.png
          fi
          if [[ ! -f build/icon.ico ]]; then
            convert build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico \
              || magick build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico
          fi
          ls -la build/

      # `secrets` cannot be used in `if:` — skip inside the script when the secret is unset.
      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [ -z "${MAC_CSC_LINK:-}" ]; then
            echo "MAC_CSC_LINK not set — skipping keychain import (unsigned build)"
            exit 0
          fi
          echo "$MAC_CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "ci-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci-keychain-password" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "ci-keychain-password" build.keychain
          rm /tmp/cert.p12

      # Do not set CSC_* / WIN_CSC_* / APPLE_* to empty strings — that breaks signing and can
      # produce "…/billbook-app not a file". Only export when secrets exist.
      - name: electron-builder publish
        working-directory: billbook-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CSC_LINK_SECRET: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD_SECRET: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CSC_LINK_SECRET:-}" ]] && [[ "${{ matrix.platform }}" == "mac" ]]; then
            export CSC_LINK="$MAC_CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD_SECRET"
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
          else
            export CSC_IDENTITY_AUTO_SELECT=false
          fi
          if [[ -n "${WIN_CSC_LINK_SECRET:-}" ]] && [[ "${{ matrix.platform }}" == "win" ]]; then
            export WIN_CSC_LINK="$WIN_CSC_LINK_SECRET"
            export WIN_CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD_SECRET"
          fi
          # GitHub-hosted macOS runners often fail on DMG (hdiutil resize "Device not configured").
          # electron-updater uses the ZIP on mac anyway — build ZIP only in CI.
          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            npx electron-builder --mac zip --${{ matrix.arch }} --publish always
          else
            npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish always
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: dist-${{ matrix.platform }}-${{ matrix.arch }}
          path: billbook-app/dist/
          retention-days: 7
